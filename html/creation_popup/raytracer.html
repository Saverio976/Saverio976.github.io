<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Paradox - Créations - RayTracer</title>
    <link rel="stylesheet" href="/css/index.css">
    <script src="/js/index.js"></script>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Niconne&display=swap" rel="stylesheet">
</head>
<body onload="SetTime()">
    <p>Errare humanum est, perseverare diabolicum</p>
    <h1>Mes Créations - RayTracer [C++]</h1>

    <p><center><a href="https://github.com/Saverio976/Raytracer">lien vers le projet</a></center></p>
    <p>Avec <a href="https://github.com/bahmez">bahmez</a>, <a href="https://github.com/SimonVermeulen">SimonVermeulen</a> et <a href="https://github.com/Amaz31">Amaz31</a></p>

    <img src="https://raw.githubusercontent.com/Saverio976/Raytracer/dev/Assets/scene4kpyramide_0.png" alt="Pyramide" width="40%" height="40%">

    <p>Un raytracer en C++ sans utilisation de librairies externes</p>

    <footer>
        <p id="time">loading . . .</p>
    </footer>

    <!-- animated square -->
    <div class="area" >
        <ul class="circles">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div >

    <!-- wave at the bottom -->
    <div class="waveWrapper waveAnimation">
        <div class="waveWrapperInner bgTop">
            <div class="wave waveTop" style="background-image: url('/assets/img/wave/wave-top.png')"></div>
        </div>
        <div class="waveWrapperInner bgMiddle">
            <div class="wave waveMiddle" style="background-image: url('/assets/img/wave/wave-mid.png')"></div>
        </div>
        <div class="waveWrapperInner bgBottom">
            <div class="wave waveBottom" style="background-image: url('/assets/img/wave/wave-bot.png')"></div>
        </div>
    </div>
</body>
</html>
