<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Paradox - Créations</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/creation.css">
    <script src="/js/index.js"></script>
    <script src="/js/creation.js"></script>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Niconne&display=swap" rel="stylesheet">
</head>
<body onload="SetTime()">
    <div class="scrollmenu">
        <a href="/index.html">Présentation</a>
        <a class="active" href="/html/creation.html">Mes Créations</a>
        <a href="/html/contact.html">Me Contacter</a>
    </div>
    <p>Errare humanum est, perseverare diabolicum</p>
    <h1>Mes Créations</h1>

    <div class="row">
        <div class="column">
            <div class="content">
                <img src="/assets/img/creation/runner.png" alt="Runner">
                <h3>Runner [C]</h3>
                <button class="open" onclick="openInfo('runner')">+ info</button>
            </div>
        </div>
        <div class="column">
            <div class="content">
                <img src="/assets/img/creation/chat_app_tui.png" alt="Chat App TUI">
                <h3>Chat App [Python]</h3>
                <button class="open" onclick="openInfo('chatapp')">+ info</button>
            </div>
        </div>
        <div class="column">
            <div class="content">
                <img src="/assets/img/creation/screensaver.png" alt="ScreenSaver">
                <h3>ScreenSaver [C]</h3>
                <button class="open" onclick="openInfo('screensaver')">+ info</button>
            </div>
        </div>
        <div class="column">
            <div class="content">
                <img src="/assets/img/creation/singularchatelet.png" alt="SingularChatelet">
		<h3>SingularChatelet [Python]</h3>
                <button class="open" onclick="openInfo('singularchatelet')">+ info</button>
            </div>
        </div>
    </div>

    <footer>
        <p id="time">loading . . .</p>
    </footer>

    <!-- animated square -->
    <div class="area" >
        <ul class="circles">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div >

    <!-- wave at the bottom -->
    <div class="waveWrapper waveAnimation">
        <div class="waveWrapperInner bgTop">
            <div class="wave waveTop" style="background-image: url('/assets/img/wave/wave-top.png')"></div>
        </div>
        <div class="waveWrapperInner bgMiddle">
            <div class="wave waveMiddle" style="background-image: url('/assets/img/wave/wave-mid.png')"></div>
        </div>
        <div class="waveWrapperInner bgBottom">
            <div class="wave waveBottom" style="background-image: url('/assets/img/wave/wave-bot.png')"></div>
        </div>
    </div>
</body>
</html>
