<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Paradox - Créations</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/creation.css">
    <script src="../js/index.js"></script>
    <script src="../js/creation.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Niconne&display=swap" rel="stylesheet">
</head>
<body onload="SetTime()">
    <div class="scrollmenu">
        <a href="../index.html">Présentation</a>
        <a class="active" href="creation.html">Mes Créations</a>
        <a href="contact.html">Me Contacter</a>
    </div>
    <p>Errare humanum est, perseverare diabolicum</p>
    <h1>Mes Créations</h1>

    <div class="row">
        <div class="column">
            <div class="content">
                <img src="../assets/img/chat_app_tui.png" alt="Chat App TUI">
                <h3>Chat App en Python</h3>
                <button class="open" onclick="openInfo('chatapp')">+ info</button>
            </div>
        </div>
        <div class="column">
            <div class="content">
                <img src="../assets/img/hangman.png" alt="Hangman">
                <h3>Hangman en C</h3>
                <button class="open" onclick="openInfo('hangman')">+ info</button>
            </div>
        </div>
        <div class="column">
            <div class="content">
                <img src="../assets/img/libmy.png" alt="libmy">
                <h3>Lib personnel en C</h3>
                <button class="open" onclick="openInfo('libmy')">+ info</button>
            </div>
        </div>
    </div>

    <!-- wave at the bottom -->
    <div class="waveWrapper waveAnimation">
        <div class="waveWrapperInner bgTop">
            <div class="wave waveTop" style="background-image: url('../assets/img/wave-top.png')"></div>
        </div>
        <div class="waveWrapperInner bgMiddle">
            <div class="wave waveMiddle" style="background-image: url('../assets/img/wave-mid.png')"></div>
        </div>
        <div class="waveWrapperInner bgBottom">
            <div class="wave waveBottom" style="background-image: url('../assets/img/wave-bot.png')"></div>
        </div>
    </div>

    <footer>
        <p id="time">loading . . .</p>
    </footer>
</body>
</html>
